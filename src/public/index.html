<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/style.css" />
    <title>CadastroLaB</title>
  </head>
  <body>
    <div class="bigNoise" aria-hidden="true"></div>
    <div class="pageContainer">
      <aside class="asideContainer">
        <div class="asideInner">
          <div class="brandMark">
            <span class="brandIcon" aria-hidden="true">⬡</span>
            <span class="title">CadastroLaB</span>
          </div>
          <div class="asideContent">
            <h1 class="asideTitle">
              Crie sua <br />
              <em>conta agora</em>
            </h1>
            <p class="asideSubTitle">
              Preencha os dados ao lado. O endereço é preenchido automaticamente
              pelo CEP.
            </p>

            <ul class="listContainer">
              <li class="listContainer">
                <span class="listIcon" aria-hidden="true">◈</span>
                Endereço automático via CEP
              </li>
              <li class="listContainer">
                <span class="listIcon" aria-hidden="true">◈</span>
                Dados salvos ao recarregar
              </li>
              <li class="listContainer">
                <span class="listIcon" aria-hidden="true">◈</span>
                Validação em tempo real
              </li>
            </ul>
          </div>

          <div class="progressContainer" aria-label="Progresso de formulário">
            <div class="progressHeader">
              <span class="progressLabel">Completude</span>
              <span class="progressValue" id="progressValue">0%</span>
            </div>
            <div class="progressTrack" role="presentation">
              <div class="progressFill" id="progressFill"></div>
            </div>
          </div>
        </div>
      </aside>

      <main class="mainContainer">
        <form
          class="formContainer"
          id="registerForm"
          novalidate
          autocomplete="off"
        >
          <fieldset class="fieldContainer" id="sectionProfile">
            <legend class="fieldLegend">
              <span class="legend" aria-hidden="true">01</span>
              Dados pessoais
            </legend>

            <div class="gridContainer gridTwoContainer">
              <div class="fieldGroup" id="groupName">
                <label for="inputName" class="fieldLabel">Nome</label>
                <input
                  type="text"
                  id="inputName"
                  placeholder="Seu nome"
                  autocapitalize="off"
                  class="input"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackName"
                  aria-live="polite"
                ></span>
              </div>

              <div class="fieldGroup" id="groupCpf">
                <label for="inputCpf" class="fieldLabel">CPF</label>
                <input
                  type="text"
                  id="inputCpf"
                  placeholder="000.000.000-00"
                  maxlength="14"
                  autocomplete="off"
                  class="input"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackCpf"
                  aria-live="polite"
                ></span>
              </div>
            </div>

            <div class="gridContainer gridTwoContainer">
              <div class="fieldGroup" id="groupEmail">
                <label for="groupEmail" class="fieldLabel"> Email </label>
                <input
                  type="email"
                  id="inputEmail"
                  autocapitalize="off"
                  placeholder="seuemail@email.com"
                  class="input"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackEmail"
                  aria-live="polite"
                ></span>
              </div>

              <div class="fieldGroup" id="groupPhone">
                <label for="inputPhone" class="fieldLabel" id="groupPhone"
                  >Telefone</label
                >
                <input
                  type="numeric"
                  id="inputPhone"
                  placeholder="(00) 00000-0000"
                  maxlength="15"
                  class="input"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackTelphone"
                  aria-live="polite"
                ></span>
              </div>
            </div>
          </fieldset>

          <fieldset class="fieldContainer" id="sectionAddress">
            <legend class="sectionLegend">
              <span class="legend">02</span>
              Endereço
            </legend>
            <div class="gridContainer gridThreeContainer">
              <div class="fieldGroup fieldGroupCep" id="groupCep">
                <label for="inputCep" class="fieldLabel">CEP</label>
                <input
                  type="text"
                  id="inputCep"
                  autocapitalize="off"
                  maxlength="9"
                  placeholder="00000-000"
                  class="input"
                />
                <span
                  class="inputSpinner"
                  id="cepSpinner"
                  aria-hidden="true"
                  hidden
                  >⟳</span
                >
                <span
                  class="fieldFeedback"
                  id="feedbackCep"
                  aria-live="polite"
                ></span>
              </div>

              <div class="fieldGroup fieldGroupStreet" id="groupStreet">
                <label for="inputStreet" class="fieldLabel">Rua</label>
                <input
                  type="text"
                  id="inputStreet"
                  autocapitalize="on"
                  placeholder="logradouro"
                />
              </div>

              <div class="fieldGroup" id="groupNumber">
                <label for="inputNumber" class="fieldLabel">Número</label>
                <input
                  type="number"
                  id="inputNumber"
                  placeholder="Nº"
                  class="input"
                />
              </div>

              <div class="fieldGroup" id="groupNeighborhood">
                <label for="inputNeighborhood" class="fieldLabel">Bairro</label>
                <input
                  type="text"
                  id="inputNeighborhood"
                  autocapitalize="on"
                  placeholder="Bairro"
                  class="input"
                />
              </div>

              <div class="fieldGroup" id="groupCity">
                <label class="fieldLabel" for="inputCity">Cidade</label>
                <input
                  class="fieldInput fieldReadonly"
                  id="inputCity"
                  type="text"
                  placeholder="Preenchido pelo CEP"
                  readonly
                  autocomplete="off"
                />
              </div>

              <div class="fieldGroup" id="groupState">
                <label for="inputState" class="fieldLabel">Estado</label>
                <input
                  type="text"
                  id="inputState"
                  placeholder="UF"
                  autocapitalize="on"
                  class="input"
                />
              </div>
            </div>
          </fieldset>

          <fieldset class="fieldContainer" id="sectionAccess">
            <legend class="fieldLegend">
              <span class="legend" aria-hidden="true">03</span>
              Acesso
            </legend>

            <div class="fieldGroup gridTwoContainer">
              <div class="fieldGroup" id="groupPassword">
                <label for="inputPassword" class="fieldLabel">Senha</label>
                <input
                  type="text"
                  id="inputPassword"
                  autocomplete="off"
                  autocapitalize="off"
                  placeholder="Sua senha (Mínimo de 8 caracteres)"
                  class="input"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackPassword"
                  aria-live="polite"
                ></span>
              </div>
              <div class="fieldGroup" id="groupConfirmPassword">
                <label for="inputConfirmPassword" class="fieldLabel"
                  >Confirme a senha</label
                >
                <input
                  type="text"
                  id="inputConfirmPassword"
                  placeholder="Confirme sua a senha"
                  autocapitalize="off"
                  autocomplete="off"
                  class="input"
                />
                <span class="fieldFeedback" id="feedbackConfirmPassword"></span>
              </div>
            </div>
          </fieldset>

          <div class="actionContaner">
            <button class="btn btnGhost" id="clearBtn" type="button">
              Limpar campos
            </button>

            <button class="btn btnPrimary" id="btn" type="submit" disabled>
              <span class="btnText">Criar conta</span>
              <span class="btnIcon" aria-hidden="true">→</span>
            </button>
          </div>
        </form>
      </main>
    </div>
    <script src="./script/index.js" defer></script>
  </body>
</html>
