<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/style.css" />
    <title>CadastroLaB</title>
  </head>
  <body>
    <div class="bigNoise" aria-hidden="true"></div>
    <div class="pageContainer">
      <aside class="asideContainer">
        <div class="asideInner">
          <div class="brandMark">
            <span class="brandIcon" aria-hidden="true">⬡</span>
            <span class="title">CadastroLaB</span>
          </div>
          <div class="asideContent">
            <h1 class="asideTitle">
              Crie sua <br />
              <em>conta agora</em>
            </h1>
            <p class="asideSubTitle">
              Preencha os dados ao lado. O endereço é preenchido automaticamente
              pelo CEP.
            </p>

            <ul class="listContainer">
              <li class="listContainer">
                <span class="listIcon" aria-hidden="true">◈</span>
                Endereço automático via CEP
              </li>
              <li class="listContainer">
                <span class="listIcon" aria-hidden="true">◈</span>
                Dados salvos ao recarregar
              </li>
              <li class="listContainer">
                <span class="listIcon" aria-hidden="true">◈</span>
                Validação em tempo real
              </li>
            </ul>
          </div>

          <div class="progressContainer" aria-label="Progresso de formulário">
            <div class="progressHeader">
              <span class="progressLabel">Completude</span>
              <span class="progressValue" id="progressValue">0%</span>
            </div>
            <div class="progressTrack" role="presentation">
              <div class="progressFill" id="progressFill"></div>
            </div>
          </div>
        </div>
      </aside>

      <main class="mainContainer">
        <form
          class="formContainer"
          id="registerForm"
          novalidate
          autocomplete="off"
        >
          <fieldset class="fieldContainer" id="fieldContainer">
            <legend class="fieldLegend">
              <span class="legend" aria-hidden="true">01</span>
              Dados pessoais
            </legend>

            <div class="gridContainer gridTwoContainer">
              <div class="fieldGroup" id="groupName">
                <label for="inputName" class="fieldLabel">Nome</label>
                <input
                  type="text"
                  id="inputName"
                  placeholder="Seu nome"
                  autocapitalize="off"
                  class="input"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackName"
                  aria-live="polite"
                ></span>
              </div>

              <div class="fieldGroup" id="groupCpf">
                <label for="inputCpf" class="fieldLabel">CPF</label>
                <input
                  type="text"
                  id="inputCpf"
                  placeholder="000.000.000-00"
                  maxlength="14"
                  autocomplete="off"
                  class="input"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackCpf"
                  aria-live="polite"
                ></span>
              </div>

              <div class="fieldGroup" id="groupEmail">
                <label for="groupEmail" class="fieldLabel" id="groupEmail">
                  Email
                </label>
                <input
                  type="email"
                  id="inputEmail"
                  autocapitalize="off"
                  placeholder="seuemail@email.com"
                  class="input"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackEmail"
                  aria-live="polite"
                ></span>
              </div>

              <div class="fieldGroup">
                <label for="inputTelphone" class="fieldLabel">Telefone</label>
                <input
                  type="numeric"
                  id="inputTelphone"
                  placeholder="(00) 00000-0000"
                  maxlength="15"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackTelphone"
                  aria-live="polite"
                ></span>
              </div>
            </div>
          </fieldset>
        </form>
      </main>
    </div>
    <script src="./script/index.js" defer></script>
  </body>
</html>
