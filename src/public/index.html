<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/style.css" />
    <title>CadastroLab — Registro de Usuário</title>
  </head>
  <body>
    <div class="bgNoise" aria-hidden="true"></div>

    <div class="pageContainer">
      <aside class="asideContainer">
        <div class="asideInner">
          <div class="brandMark">
            <span class="brandIcon" aria-hidden="true">⬡</span>
            <span class="title">CadastroLab</span>
          </div>
          <div class="asideContent">
            <h1 class="asideTitle">
              Crie sua<br />
              <em>conta agora</em>
            </h1>
            <p class="asideSubtitle">
              Preencha os dados ao lado. O endereço é preenchido automaticamente
              pelo CEP.
            </p>
            <ul class="listContainer">
              <li class="listItem">
                <span class="listIcon" aria-hidden="true">◈</span>
                Endereço automático via CEP
              </li>
              <li class="listItem">
                <span class="listIcon" aria-hidden="true">◈</span>
                Dados salvos ao recarregar
              </li>
              <li class="listItem">
                <span class="listIcon" aria-hidden="true">◈</span>
                Validação em tempo real
              </li>
            </ul>
          </div>
          <div class="progressContainer" aria-label="Progresso do formulário">
            <div class="progressHeader">
              <span class="progressLabel">Completude</span>
              <span class="progressValue" id="progressValue">0%</span>
            </div>
            <div class="progressTrack" role="presentation">
              <div class="progressFill" id="progressFill"></div>
            </div>
          </div>
        </div>
      </aside>

      <main class="mainContainer">
        <form
          class="formContainer"
          id="registerForm"
          novalidate
          autocomplete="off"
        >
          <fieldset class="fieldContainer" id="fieldProfile">
            <legend class="fieldLegend">
              <span class="legend" aria-hidden="true">01</span>
              Dados Pessoais
            </legend>

            <div class="fieldGrid fieldGridTwo">
              <div class="fieldGroup" id="groupName">
                <label class="fieldLabel" for="inputName">Nome completo</label>
                <input
                  class="input"
                  id="inputName"
                  type="text"
                  placeholder="Seu nome completo"
                  autocomplete="off"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackName"
                  aria-live="polite"
                ></span>
              </div>

              <div class="fieldGroup" id="groupCpf">
                <label class="fieldLabel" for="inputCpf">CPF</label>
                <input
                  class="input"
                  id="inputCpf"
                  type="text"
                  placeholder="000.000.000-00"
                  maxlength="14"
                  autocomplete="off"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackCpf"
                  aria-live="polite"
                ></span>
              </div>
            </div>

            <div class="fieldGrid fieldGridTwo">
              <div class="fieldGroup" id="groupEmail">
                <label class="fieldLabel" for="inputEmail">E-mail</label>
                <input
                  class="input"
                  id="inputEmail"
                  type="email"
                  placeholder="seu@email.com"
                  autocomplete="off"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackEmail"
                  aria-live="polite"
                ></span>
              </div>

              <div class="fieldGroup" id="groupPhone">
                <label class="fieldLabel" for="inputPhone">Telefone</label>
                <input
                  class="input"
                  id="inputPhone"
                  type="text"
                  placeholder="(00) 00000-0000"
                  maxlength="15"
                  autocomplete="off"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackPhone"
                  aria-live="polite"
                ></span>
              </div>
            </div>
          </fieldset>

          <fieldset class="fieldContainer" id="fieldAddress">
            <legend class="fieldLegend">
              <span class="legend" aria-hidden="true">02</span>
              Endereço
            </legend>

            <div class="fieldGrid fieldGridThree">
              <div class="fieldGroup fieldGroupCep" id="groupCep">
                <label class="fieldLabel" for="inputCep">CEP</label>
                <div class="inputWithIcon">
                  <input
                    class="input"
                    id="inputCep"
                    type="text"
                    placeholder="00000-000"
                    maxlength="9"
                    autocomplete="off"
                  />
                  <span
                    class="inputSpinner"
                    id="cepSpinner"
                    aria-hidden="true"
                    hidden
                    >⟳</span
                  >
                </div>
                <span
                  class="fieldFeedback"
                  id="feedbackCep"
                  aria-live="polite"
                ></span>
              </div>

              <div class="fieldGroup fieldGroupStreet" id="groupStreet">
                <label class="fieldLabel" for="inputStreet">Rua</label>
                <input
                  class="input fieldReadonly"
                  id="inputStreet"
                  type="text"
                  placeholder="Preenchido pelo CEP"
                  readonly
                  autocomplete="off"
                />
              </div>

              <div class="fieldGroup" id="groupNumber">
                <label class="fieldLabel" for="inputNumber">Número</label>
                <input
                  class="input"
                  id="inputNumber"
                  type="text"
                  placeholder="Nº"
                  autocomplete="off"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackNumber"
                  aria-live="polite"
                ></span>
              </div>
            </div>

            <div class="fieldGrid fieldGridThree">
              <div class="fieldGroup" id="groupNeighborhood">
                <label class="fieldLabel" for="inputNeighborhood">Bairro</label>
                <input
                  class="input fieldReadonly"
                  id="inputNeighborhood"
                  type="text"
                  placeholder="Preenchido pelo CEP"
                  readonly
                  autocomplete="off"
                />
              </div>

              <div class="fieldGroup" id="groupCity">
                <label class="fieldLabel" for="inputCity">Cidade</label>
                <input
                  class="input fieldReadonly"
                  id="inputCity"
                  type="text"
                  placeholder="Preenchido pelo CEP"
                  readonly
                  autocomplete="off"
                />
              </div>

              <div class="fieldGroup" id="groupState">
                <label class="fieldLabel" for="inputState">Estado</label>
                <input
                  class="input fieldReadonly"
                  id="inputState"
                  type="text"
                  placeholder="UF"
                  readonly
                  autocomplete="off"
                />
              </div>
            </div>
          </fieldset>

          <fieldset class="fieldContainer" id="fieldAccess">
            <legend class="fieldLegend">
              <span class="legend" aria-hidden="true">03</span>
              Acesso
            </legend>

            <div class="fieldGrid fieldGridTwo">
              <div class="fieldGroup" id="groupPassword">
                <label class="fieldLabel" for="inputPassword">Senha</label>
                <input
                  class="input"
                  id="inputPassword"
                  type="password"
                  placeholder="Mínimo 8 caracteres"
                  autocomplete="off"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackPassword"
                  aria-live="polite"
                ></span>
              </div>

              <div class="fieldGroup" id="groupPasswordConfirm">
                <label class="fieldLabel" for="inputConfirmPassword"
                  >Confirmar senha</label
                >
                <input
                  class="input"
                  id="inputConfirmPassword"
                  type="password"
                  placeholder="Repita a senha"
                  autocomplete="off"
                />
                <span
                  class="fieldFeedback"
                  id="feedbackPasswordConfirm"
                  aria-live="polite"
                ></span>
              </div>
            </div>
          </fieldset>

          <div class="actionContainer">
            <button class="btn btnGhost" id="clearBtn" type="button">
              Limpar dados
            </button>
            <button class="btn btnPrimary" id="btn" type="submit" disabled>
              <span class="btnText">Criar conta</span>
              <span class="btniIcon" aria-hidden="true">→</span>
            </button>
          </div>
        </form>
      </main>
    </div>

    <script src="./script/index.js" defer></script>
  </body>
</html>
